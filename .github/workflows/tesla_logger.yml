name: Tesla Data Logger

on:
  schedule:
    # Run every 5 minutes, 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  log-tesla-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Poll Tesla API and save data
        env:
          TESLA_REFRESH_TOKEN: ${{ secrets.TESLA_REFRESH_TOKEN }}
        run: python tesla_logger/poll_tesla.py

      - name: Update refresh token secret if rotated
        if: hashFiles('tesla_data/.new_refresh_token') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(cat tesla_data/.new_refresh_token)
          if [ -n "$NEW_TOKEN" ]; then
            echo "Updating TESLA_REFRESH_TOKEN secret..."
            gh secret set TESLA_REFRESH_TOKEN --body "$NEW_TOKEN"
            rm tesla_data/.new_refresh_token
          fi

      - name: Archive old raw files monthly
        run: |
          # Move raw files older than 30 days into monthly archive folders
          # NEVER delete — this is evidence
          for f in $(find tesla_data/raw -name "*.json" -mtime +30 2>/dev/null); do
            MONTH=$(basename "$f" | cut -c1-7)
            mkdir -p "tesla_data/raw/archive/${MONTH}"
            mv "$f" "tesla_data/raw/archive/${MONTH}/"
          done

      - name: Commit and push data
        run: |
          git config user.name "Tesla Logger Bot"
          git config user.email "tesla-logger@josh5611.github.io"
          git add tesla_data/
          BATTERY=$(python -c "import json; d=json.load(open('tesla_data/latest.json')); print(f\"{d['battery']['level']}%\" if d['battery']['level'] else 'N/A')" 2>/dev/null || echo "N/A")
          STATE=$(python -c "import json; d=json.load(open('tesla_data/latest.json')); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
          CHARGE=$(python -c "import json; d=json.load(open('tesla_data/latest.json')); print(d.get('charging',{}).get('state',''))" 2>/dev/null || echo "")
          MSG="Tesla: ${BATTERY} | ${STATE}"
          if [ -n "$CHARGE" ] && [ "$CHARGE" != "None" ]; then MSG="${MSG} | ${CHARGE}"; fi
          MSG="${MSG} | $(date -u '+%Y-%m-%d %H:%M UTC')"
          git commit -m "$MSG" || echo "Nothing to commit"
          git pull --rebase || true
          git push || echo "Push failed - will retry next run"
