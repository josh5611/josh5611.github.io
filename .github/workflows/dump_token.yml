name: Dump Tesla Token Once
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Save current refresh token to artifact
        env:
          REFRESH_TOKEN: ${{ secrets.TESLA_REFRESH_TOKEN }}
        run: |
          mkdir -p out
          RESP=$(curl -s -X POST https://auth.tesla.com/oauth2/v3/token \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"refresh_token\",\"client_id\":\"b26f2545-b2fa-45b4-8d06-be4a298249fc\",\"refresh_token\":\"$REFRESH_TOKEN\"}")
          echo "$RESP" > out/tesla_token.json
      - uses: actions/upload-artifact@v4
        with:
          name: tesla-token-dump
          path: out/
          retention-days: 1
